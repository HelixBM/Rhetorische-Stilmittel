<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rhetorische Stilmittel – Übungsapp</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --text-soft: #6B6B6B;
    --accent: #2D5A27;
    --accent-light: #E8F0E7;
    --accent-hover: #3D7A35;
    --border: #E5E3DE;
    --correct: #2D5A27;
    --correct-bg: #E8F0E7;
    --wrong: #9E2B2B;
    --wrong-bg: #FDEAEA;
    --radius: 12px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }
  .nav-header {
    width: 100%;
    max-width: 720px;
    margin-bottom: 32px;
    text-align: center;
  }
  .nav-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .nav-header p {
    color: var(--text-soft);
    font-size: 14px;
  }
  .mode-tabs {
    display: flex;
    gap: 6px;
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }
  .mode-tab {
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-tab:hover { color: var(--text); background: var(--bg); }
  .mode-tab.active { background: var(--accent); color: #fff; }
  .card-area {
    width: 100%;
    max-width: 620px;
    margin-top: 8px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px;
    box-shadow: var(--shadow-sm);
  }
  .progress-bar-track {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .card-counter {
    font-size: 12px;
    color: var(--text-soft);
    margin-bottom: 16px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .flashcard-front { text-align: center; padding: 20px 0; }
  .flashcard-name {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    margin-bottom: 16px;
  }
  .flashcard-hint { font-size: 13px; color: var(--text-soft); cursor: pointer; }
  .flashcard-back { animation: fadeUp 0.25s ease; }
  .flashcard-def {
    font-size: 17px;
    line-height: 1.6;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .flashcard-example-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-soft);
    margin-bottom: 10px;
    font-weight: 600;
  }
  .flashcard-examples { display: flex; flex-direction: column; gap: 8px; }
  .flashcard-examples span {
    font-size: 15px;
    color: var(--text-soft);
    line-height: 1.5;
    padding-left: 12px;
    border-left: 2px solid var(--accent-light);
  }
  .mc-example, .ft-example {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    line-height: 1.5;
    text-align: center;
    margin-bottom: 28px;
    padding: 16px 0;
  }
  .mc-options { display: flex; flex-direction: column; gap: 10px; }
  .mc-option {
    width: 100%;
    padding: 14px 18px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .mc-option:hover:not(.mc-correct):not(.mc-wrong) {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .mc-option.mc-correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); }
  .mc-option.mc-wrong { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }
  .ft-input-row { display: flex; gap: 10px; }
  .ft-input {
    flex: 1;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .ft-input:focus { border-color: var(--accent); }
  .ft-input.ft-correct { border-color: var(--correct); background: var(--correct-bg); }
  .ft-input.ft-wrong { border-color: var(--wrong); background: var(--wrong-bg); }
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    animation: fadeUp 0.2s ease;
  }
  .feedback.correct { background: var(--correct-bg); color: var(--correct); }
  .feedback.wrong { background: var(--wrong-bg); color: var(--wrong); }
  .btn {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ghost { background: transparent; color: var(--text-soft); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: var(--text-soft); color: var(--text); }
  .btn-row { display: flex; justify-content: space-between; margin-top: 24px; gap: 10px; }
  .results { text-align: center; padding: 24px 0; }
  .results-score {
    font-family: 'DM Serif Display', serif;
    font-size: 56px;
    font-weight: 400;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .results-label { font-size: 14px; color: var(--text-soft); margin-bottom: 28px; }
  .results-message { font-size: 18px; margin-bottom: 28px; line-height: 1.5; }
  .settings-row {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .setting-label { font-size: 13px; color: var(--text-soft); font-weight: 500; }
  .setting-select {
    padding: 6px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }
  .setting-select:focus { border-color: var(--accent); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeUp 0.3s ease; }
  @media (max-width: 600px) {
    .card { padding: 24px 20px; }
    .flashcard-name { font-size: 26px; }
    .mc-example, .ft-example { font-size: 18px; }
    .ft-input-row { flex-direction: column; }
    .mode-tab { padding: 8px 12px; font-size: 13px; }
    .nav-header h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const STILMITTEL = [
  {
    name: "Allegorie",
    definition: "Erweiterte Metapher: Ein abstrakter Begriff wird \u00fcber einen l\u00e4ngeren Textabschnitt hinweg durch ein konkretes Bild dargestellt, oft als Personifikation.",
    examples: [
      "\u201eJustitia\u201c \u2013 Frauenfigur mit Waage und Schwert steht f\u00fcr Gerechtigkeit",
      "\u201eSensenmann\u201c \u2013 Figur mit Sense steht f\u00fcr den Tod",
      "\u201eFortuna\u201c \u2013 das Gl\u00fccksrad als Bild f\u00fcr das wechselhafte Schicksal",
      "\u201ePlatons H\u00f6hlengleichnis\u201c \u2013 die H\u00f6hle steht f\u00fcr die Welt der T\u00e4uschung"
    ]
  },
  {
    name: "Alliteration",
    definition: "Gleicher Anfangslaut bei zwei oder mehr aufeinanderfolgenden W\u00f6rtern.",
    examples: [
      "\u201eMilch macht m\u00fcde M\u00e4nner munter.\u201c",
      "\u201eKind und Kegel\u201c",
      "\u201eWind und Wetter\u201c",
      "\u201e\u00dcber Stock und Stein\u201c",
      "\u201eMit Mann und Maus\u201c"
    ]
  },
  {
    name: "Anapher",
    definition: "Wiederholung desselben Wortes oder derselben Wortgruppe am Anfang aufeinanderfolgender S\u00e4tze oder Verse.",
    examples: [
      "\u201eIch bin m\u00fcde. Ich bin ersch\u00f6pft. Ich bin am Ende.\u201c",
      "\u201eDas Wasser rauscht\u2019. Das Wasser schwoll.\u201c",
      "\u201eWer nie sein Brot mit Tr\u00e4nen a\u00df, / Wer nie die kummervollen N\u00e4chte\u2026\u201c",
      "\u201eEr rannte los. Er rannte schnell. Er rannte um sein Leben.\u201c"
    ]
  },
  {
    name: "Anglizismus",
    definition: "Verwendung eines englischen Wortes oder Ausdrucks in einem deutschsprachigen Text.",
    examples: [
      "\u201eDas Meeting wurde gecancelt.\u201c",
      "\u201eWir brauchen mehr Content f\u00fcr die Website.\u201c",
      "\u201eDas war ein absoluter Gamechanger.\u201c",
      "\u201eIch muss das noch downloaden.\u201c",
      "\u201eSie hat ein gutes Standing in der Firma.\u201c"
    ]
  },
  {
    name: "Antiklimax",
    definition: "Stufenweise Abstufung vom Starken zum Schwachen \u2013 das Gegenteil der Klimax.",
    examples: [
      "\u201eK\u00f6nige, F\u00fcrsten, Grafen, Ritter, Edelleute, B\u00fcrger, Bauern.\u201c",
      "\u201eEr war ein gro\u00dfer Feldherr, ein guter Soldat, ein brauchbarer Mann.\u201c",
      "\u201eIch kam, ich sah, ich ging wieder.\u201c",
      "\u201eEr war w\u00fctend, ver\u00e4rgert, leicht genervt.\u201c"
    ]
  },
  {
    name: "Antithese",
    definition: "Gegen\u00fcberstellung von gegens\u00e4tzlichen Begriffen oder Gedanken.",
    examples: [
      "\u201eDer Wahn ist kurz, die Reu ist lang.\u201c",
      "\u201eDer Geist ist willig, aber das Fleisch ist schwach.\u201c",
      "\u201eKrieg und Frieden\u201c",
      "\u201eHimmel und H\u00f6lle\u201c",
      "\u201eJung und Alt, Arm und Reich\u201c"
    ]
  },
  {
    name: "Asyndeton",
    definition: "Aufz\u00e4hlung ohne Bindew\u00f6rter (Konjunktionen) \u2013 die Begriffe stehen nur durch Kommata getrennt.",
    examples: [
      "\u201eAlles rennet, rettet, fl\u00fcchtet.\u201c",
      "\u201eEr kam, sah, siegte.\u201c",
      "\u201eHeute, morgen, \u00fcbermorgen.\u201c",
      "\u201eFriede, Freude, Eierkuchen.\u201c"
    ]
  },
  {
    name: "Chiasmus",
    definition: "\u00dcberkreuzstellung: Zwei aufeinanderfolgende Satzteile sind syntaktisch spiegelbildlich aufgebaut (AB \u2013 BA).",
    examples: [
      "\u201eDie Kunst ist lang, und kurz ist unser Leben.\u201c",
      "\u201eIch schlafe am Tag, in der Nacht wache ich.\u201c",
      "\u201eEng ist die Welt und das Gehirn ist weit.\u201c",
      "\u201eSie ist bescheiden, gierig bist du.\u201c"
    ]
  },
  {
    name: "Chiffre",
    definition: "R\u00e4tselhaftes, verschl\u00fcsseltes Bild, das sich nur aus dem Werk oder Gesamtwerk der Autorin/des Autors erschlie\u00dfen l\u00e4sst.",
    examples: [
      "\u201eblaues Klavier\u201c (Else Lasker-Sch\u00fcler)",
      "\u201eschwarze Milch der Fr\u00fche\u201c (Paul Celan, Todesfuge)",
      "\u201edie Windsbraut\u201c (Georg Trakl)",
      "\u201eDer Panther\u201c als Chiffre f\u00fcr Gefangenschaft (Rilke)"
    ]
  },
  {
    name: "Ellipse",
    definition: "Auslassung eines Satzteils, der zum Verst\u00e4ndnis nicht zwingend n\u00f6tig ist. Der Satz ist grammatisch unvollst\u00e4ndig.",
    examples: [
      "\u201eJe fr\u00fcher, desto besser.\u201c",
      "\u201eEnde gut, alles gut.\u201c",
      "\u201eWas nun?\u201c",
      "\u201eErst die Arbeit, dann das Vergn\u00fcgen.\u201c",
      "\u201eDu vielleicht, ich sicher nicht.\u201c"
    ]
  },
  {
    name: "Emphase",
    definition: "Hervorhebung eines Wortes durch besondere Betonung, sodass es einen tieferen oder st\u00e4rkeren Sinn bekommt.",
    examples: [
      "\u201eDas ist ein MENSCH!\u201c (im Sinne von: ein besonderer Mensch)",
      "\u201eDAS nenne ich Kunst!\u201c",
      "\u201eAch du meine G\u00fcte!\u201c",
      "\u201eJetzt ist SCHLUSS!\u201c"
    ]
  },
  {
    name: "Enjambement",
    definition: "Zeilensprung in der Lyrik: Ein Satz oder Satzteil wird \u00fcber das Versende hinaus in die n\u00e4chste Zeile fortgef\u00fchrt.",
    examples: [
      "\u201eDer Nebel dr\u00fcckt / die D\u00e4cher schwer\u2026\u201c",
      "\u201eIch ging im Feld / und sah die Blumen stehen.\u201c",
      "\u201eAm Brunnen vor / dem Tore\u2026\u201c",
      "\u201eUnd es wallet und siedet / und brauset und zischt.\u201c"
    ]
  },
  {
    name: "Enumeration",
    definition: "Aufz\u00e4hlung mehrerer Begriffe, um einen Oberbegriff zu veranschaulichen oder eine Aussage zu verst\u00e4rken.",
    examples: [
      "\u201eNun ruhen alle W\u00e4lder, / Vieh, Menschen, St\u00e4dt und Felder.\u201c",
      "\u201eSonne, Mond und Sterne\u201c",
      "\u201eFeld, Wald und Wiese\u201c",
      "\u201eFeuer, Wasser, Erde, Luft\u201c",
      "\u201eAlte und Junge, Dumme und Gescheite, Arme und Reiche sind betroffen.\u201c"
    ]
  },
  {
    name: "Epipher",
    definition: "Wiederholung desselben Wortes am Ende aufeinanderfolgender S\u00e4tze oder Verse (Gegenteil der Anapher).",
    examples: [
      "\u201eEr schreibt nicht. Er liest nicht. Er lernt nicht.\u201c",
      "\u201eDoch alle Lust will Ewigkeit, / will tiefe, tiefe Ewigkeit.\u201c",
      "\u201eIch bin gl\u00fccklich, wir alle sind gl\u00fccklich.\u201c",
      "\u201eEr kopiert nicht. Er liest nicht.\u201c"
    ]
  },
  {
    name: "Euphemismus",
    definition: "Besch\u00f6nigende oder verharmlosende Umschreibung f\u00fcr etwas Unangenehmes.",
    examples: [
      "\u201eEr ist von uns gegangen.\u201c (statt: Er ist gestorben.)",
      "\u201eFreisetzung von Mitarbeitern\u201c (statt: Entlassung)",
      "\u201eSeniorenresidenz\u201c (statt: Altenheim)",
      "\u201eEwiger Schlaf\u201c (statt: Tod)",
      "\u201eKollateralschaden\u201c (statt: zivile Opfer)"
    ]
  },
  {
    name: "Hendiadyoin",
    definition: "Doppelausdruck: Zwei bedeutungs\u00e4hnliche W\u00f6rter werden mit \u201eund\u201c verbunden, um einen einzigen Begriff zu verst\u00e4rken.",
    examples: [
      "\u201eAngst und Bange\u201c",
      "\u201eGrund und Boden\u201c",
      "\u201eArt und Weise\u201c",
      "\u201eHilfe und Beistand\u201c",
      "\u201eRat und Tat\u201c"
    ]
  },
  {
    name: "Hyperbel",
    definition: "Starke \u00dcbertreibung eines Ausdrucks, um eine besondere Wirkung zu erzielen.",
    examples: [
      "\u201eIch habe dir das schon tausendmal gesagt!\u201c",
      "\u201eEin Meer von Tr\u00e4nen\u201c",
      "\u201eTodm\u00fcde sein\u201c",
      "\u201eBlitzschnell\u201c",
      "\u201eDas dauert ja eine Ewigkeit!\u201c",
      "\u201eIch sterbe vor Hunger!\u201c"
    ]
  },
  {
    name: "Inversion",
    definition: "Umkehrung der \u00fcblichen Wortstellung im Satz, z.\u00a0B. das Verb oder Objekt wird vorangestellt.",
    examples: [
      "\u201eGering war unser Auskommen.\u201c",
      "\u201eSchlimm ist diese Lage.\u201c",
      "\u201eM\u00fcde bin ich, geh zur Ruh.\u201c",
      "\u201eNat\u00fcrlich mag sie verwelkte Blumen.\u201c"
    ]
  },
  {
    name: "Ironie",
    definition: "Man sagt das Gegenteil von dem, was man meint \u2013 die wahre Bedeutung ergibt sich aus dem Zusammenhang.",
    examples: [
      "\u201eDas hast du ja toll hinbekommen!\u201c (bei einem Fehler)",
      "\u201eNa, das ist ja eine sch\u00f6ne Bescherung!\u201c",
      "\u201eSch\u00f6nes Wetter heute!\u201c (bei Regen)",
      "\u201eDanke f\u00fcr die p\u00fcnktliche Lieferung!\u201c (nach wochenlanger Versp\u00e4tung)"
    ]
  },
  {
    name: "Klimax",
    definition: "Stufenweise Steigerung von Ausdr\u00fccken \u2013 vom Schwachen zum Starken.",
    examples: [
      "\u201eIch kam, sah und siegte.\u201c",
      "\u201eIch bin erstaunt, erschrocken, entsetzt!\u201c",
      "\u201eEr war unzufrieden, w\u00fctend, rasend.\u201c",
      "\u201eHeute back ich, morgen brau ich, \u00fcbermorgen hol ich der K\u00f6nigin ihr Kind.\u201c"
    ]
  },
  {
    name: "Litotes",
    definition: "Untertreibung oder Verneinung des Gegenteils, um etwas hervorzuheben.",
    examples: [
      "\u201eDas war nicht schlecht.\u201c (= Es war gut.)",
      "\u201eNicht \u00fcbel!\u201c (= Sehr gut!)",
      "\u201eSie ist nicht unh\u00fcbsch.\u201c",
      "\u201eEr ist nicht gerade ein Genie.\u201c",
      "\u201eSie ist nicht das hellste Licht auf dem Geburtstagskuchen.\u201c"
    ]
  },
  {
    name: "Metapher",
    definition: "\u00dcbertragung eines Bildes aus einem Bedeutungsbereich in einen anderen, ohne Vergleichswort (\u201ewie\u201c).",
    examples: [
      "\u201eDas Feuer der Leidenschaft\u201c",
      "\u201eJemandem das Herz brechen\u201c",
      "\u201eDer Zahn der Zeit\u201c",
      "\u201eRabeneltern\u201c",
      "\u201eAm Fu\u00dfe des Berges\u201c",
      "\u201eW\u00fcstenschiff\u201c (= Kamel)"
    ]
  },
  {
    name: "Metonymie",
    definition: "Ersetzung eines Begriffs durch einen anderen, der in sachlicher (nicht bildlicher) Beziehung zu ihm steht.",
    examples: [
      "\u201eDas Wei\u00dfe Haus erkl\u00e4rte\u2026\u201c (statt: der Pr\u00e4sident)",
      "\u201eIch lese Goethe.\u201c (statt: ein Werk von Goethe)",
      "\u201eEr trinkt gern ein Glas.\u201c (statt: den Inhalt)",
      "\u201eBerlin hat entschieden.\u201c (statt: die Regierung)",
      "\u201eWir leben alle unter einem Dach.\u201c"
    ]
  },
  {
    name: "Neologismus",
    definition: "Wortneusch\u00f6pfung \u2013 ein neu gebildetes Wort, das es so vorher nicht gab.",
    examples: [
      "\u201eSmombie\u201c (Smartphone + Zombie)",
      "\u201eFremdsch\u00e4men\u201c",
      "\u201eWutb\u00fcrger\u201c",
      "\u201eDigitalnomade\u201c",
      "\u201eChillen\u201c"
    ]
  },
  {
    name: "Onomatopoesie",
    definition: "Lautmalerei: W\u00f6rter, die den Klang oder das Ger\u00e4usch nachahmen, das sie bezeichnen.",
    examples: [
      "\u201eDie Bienen summen.\u201c",
      "\u201eDas Wasser pl\u00e4tschert.\u201c",
      "\u201eEs knistert im Kamin.\u201c",
      "\u201eDie T\u00fcr knarrt.\u201c",
      "\u201eKuckuck, Miau, Kikeriki\u201c"
    ]
  },
  {
    name: "Oxymoron",
    definition: "Verbindung zweier sich widersprechender Begriffe zu einer Einheit.",
    examples: [
      "\u201eBitters\u00fc\u00df\u201c",
      "\u201eAlter Knabe\u201c",
      "\u201eOffenes Geheimnis\u201c",
      "\u201eBeredtes Schweigen\u201c",
      "\u201eH\u00f6lzernes Eisen\u201c",
      "\u201eKalte Glut\u201c"
    ]
  },
  {
    name: "Paradoxon",
    definition: "Scheinbar widerspr\u00fcchliche Aussage, die bei genauerem Nachdenken einen tieferen Sinn enth\u00e4lt.",
    examples: [
      "\u201eWeniger ist mehr.\u201c",
      "\u201eIch wei\u00df, dass ich nichts wei\u00df.\u201c",
      "\u201eDas Gesetz ist das Kleid der Freiheit.\u201c",
      "\u201eWer den Tod f\u00fcrchtet, hat das Leben verloren.\u201c"
    ]
  },
  {
    name: "Parallelismus",
    definition: "Wiederholung der gleichen syntaktischen Struktur in aufeinanderfolgenden S\u00e4tzen oder Satzteilen.",
    examples: [
      "\u201eHei\u00df ist die Liebe, kalt ist der Schnee.\u201c",
      "\u201eDer Vater lacht, die Mutter weint.\u201c",
      "\u201eReden ist Silber, Schweigen ist Gold.\u201c",
      "\u201eKleine Kinder, kleine Sorgen \u2013 gro\u00dfe Kinder, gro\u00dfe Sorgen.\u201c"
    ]
  },
  {
    name: "Personifikation",
    definition: "Vermenschlichung: Tieren, Gegenst\u00e4nden oder abstrakten Begriffen werden menschliche Eigenschaften zugeschrieben.",
    examples: [
      "\u201eDie Sonne lacht.\u201c",
      "\u201eDer Wind fl\u00fcstert.\u201c",
      "\u201eDie Zeit heilt alle Wunden.\u201c",
      "\u201eDer Tod klopft an die T\u00fcr.\u201c",
      "\u201eMutter Natur\u201c"
    ]
  },
  {
    name: "Polysyndeton",
    definition: "Aufz\u00e4hlung, bei der die Glieder durch die wiederholte gleiche Konjunktion verbunden sind.",
    examples: [
      "\u201eUnd es wallet und siedet und brauset und zischt.\u201c",
      "\u201eUnd der Regen f\u00e4llt und der Wind weht und die Bl\u00e4tter treiben.\u201c",
      "\u201eDas bringt nichts als Hunger und Tod und Verderben.\u201c",
      "\u201eOder heute oder morgen oder \u00fcbermorgen.\u201c"
    ]
  },
  {
    name: "Rhetorische Frage",
    definition: "Eine Frage, auf die keine Antwort erwartet wird, weil die Antwort offensichtlich ist.",
    examples: [
      "\u201eBin ich denn der Einzige, der hier arbeitet?\u201c",
      "\u201eHaben wir nicht alle schon mal einen Fehler gemacht?\u201c",
      "\u201eWer will das schon?\u201c",
      "\u201eSind wir nicht alle ein bisschen Weltmeister?\u201c"
    ]
  },
  {
    name: "Symbol",
    definition: "Ein konkreter Gegenstand, der f\u00fcr eine allgemein bekannte abstrakte Idee steht.",
    examples: [
      "Taube = Frieden",
      "Herz = Liebe",
      "Wasser = Leben, Reinigung",
      "Kreuz = Christentum, Opfer",
      "Krone = Macht, Herrschaft"
    ]
  },
  {
    name: "Syn\u00e4sthesie",
    definition: "Verkn\u00fcpfung von Sinneswahrnehmungen aus verschiedenen Bereichen (z.\u00a0B. H\u00f6ren + Sehen).",
    examples: [
      "\u201eS\u00fc\u00df klingende Glocken\u201c",
      "\u201eSchreiendes Rot\u201c",
      "\u201eWarme Farben\u201c",
      "\u201eHelle und dunkle T\u00f6ne\u201c",
      "\u201eWeicher Klang\u201c"
    ]
  },
  {
    name: "Tautologie",
    definition: "Wiederholung desselben Sachverhalts mit bedeutungsgleichen oder sinnverwandten W\u00f6rtern.",
    examples: [
      "\u201eImmer und ewig\u201c",
      "\u201eVoll und ganz\u201c",
      "\u201eNie und nimmer\u201c",
      "\u201eAngst und Bange\u201c",
      "\u201eHegen und pflegen\u201c"
    ]
  },
  {
    name: "Trias",
    definition: "Dreigliedrige Aufz\u00e4hlung \u2013 drei Begriffe oder Satzteile werden aneinandergereiht.",
    examples: [
      "\u201eFreiheit, Gleichheit, Br\u00fcderlichkeit\u201c",
      "\u201eBlut, Schwei\u00df und Tr\u00e4nen\u201c",
      "\u201eEr geht \u00fcber Tische, St\u00fchle und B\u00e4nke.\u201c",
      "\u201eGuten Morgen, guten Tag, gute Nacht.\u201c"
    ]
  },
  {
    name: "Vergleich",
    definition: "Verkn\u00fcpfung zweier Bereiche durch ein Vergleichswort: \u201ewie\u201c oder \u201eals ob\u201c.",
    examples: [
      "\u201eStark wie ein L\u00f6we\u201c",
      "\u201eSchnell wie der Wind\u201c",
      "\u201eSie ist sch\u00f6n wie eine Rose.\u201c",
      "\u201eKalt wie Eis\u201c",
      "\u201eAls ob ihm das Ereignis nichts ausmache.\u201c"
    ]
  },
  {
    name: "Wiederholung",
    definition: "Mehrfache Nennung desselben Wortes oder derselben Wendung zur Verst\u00e4rkung.",
    examples: [
      "\u201eO Freunde, nicht diese T\u00f6ne!\u201c",
      "\u201eEin Meer von Tr\u00e4nen, ein Meer von Schmerz.\u201c",
      "\u201eNein, nein, nein!\u201c",
      "\u201eIch habe es dir schon tausendmal gesagt, tausendmal!\u201c"
    ]
  },
  {
    name: "Zeugma",
    definition: "Ein Verb wird auf mehrere Satzglieder bezogen, passt aber nur zu einem davon wirklich sinnvoll.",
    examples: [
      "\u201eNimm dir Zeit und nicht das Leben!\u201c",
      "\u201eEr schlug die Scheibe und danach den Heimweg ein.\u201c",
      "\u201eIch hob den Blick und eine Tasche auf.\u201c",
      "\u201eEr verlor seinen Hut und die Geduld.\u201c"
    ]
  },
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function FlashcardMode() {
  const [deck, setDeck] = useState(() => shuffle(STILMITTEL));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const current = deck[idx];
  const total = deck.length;
  const next = () => { setFlipped(false); setTimeout(() => setIdx(i => i + 1 < total ? i + 1 : i), 100); };
  const prev = () => { setFlipped(false); setTimeout(() => setIdx(i => i - 1 >= 0 ? i - 1 : i), 100); };
  const restart = () => { setDeck(shuffle(STILMITTEL)); setIdx(0); setFlipped(false); };

  return (
    <div className="card-area fade-in">
      <div className="card">
        <div className="progress-bar-track"><div className="progress-bar-fill" style={{ width: ((idx+1)/total*100)+"%" }} /></div>
        <div className="card-counter">{idx+1} / {total}</div>
        {!flipped ? (
          <div className="flashcard-front" onClick={() => setFlipped(true)} style={{ cursor: "pointer" }}>
            <div className="flashcard-name">{current.name}</div>
            <div className="flashcard-hint">Klicken zum Aufdecken \u2193</div>
          </div>
        ) : (
          <div className="flashcard-back">
            <div className="flashcard-name" style={{ fontSize: 24, textAlign: "center", marginBottom: 16 }}>{current.name}</div>
            <div className="flashcard-def">{current.definition}</div>
            <div className="flashcard-example-label">Beispiele</div>
            <div className="flashcard-examples">
              {current.examples.slice(0,4).map((ex,i) => <span key={i}>{ex}</span>)}
            </div>
          </div>
        )}
        <div className="btn-row">
          <button className="btn btn-ghost" onClick={prev} disabled={idx===0}>\u2190 Zur\u00fcck</button>
          {idx===total-1 ? <button className="btn btn-primary" onClick={restart}>Neu mischen \u21bb</button>
            : <button className="btn btn-primary" onClick={next}>Weiter \u2192</button>}
        </div>
      </div>
    </div>
  );
}

function MultipleChoiceMode() {
  const [questionCount, setQuestionCount] = useState(10);
  const [questions, setQuestions] = useState(null);
  const [qIdx, setQIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  const generateQuestions = (count) => {
    const qs = [];
    const shuffled = shuffle(STILMITTEL);
    for (let i = 0; i < count; i++) {
      const correct = shuffled[i % shuffled.length];
      const ex = correct.examples[Math.floor(Math.random() * correct.examples.length)];
      const wrongs = shuffle(STILMITTEL.filter(s => s.name !== correct.name)).slice(0, 3);
      const options = shuffle([correct, ...wrongs]);
      qs.push({ example: ex, correctName: correct.name, options: options.map(o => o.name) });
    }
    return qs;
  };

  const start = () => { setQuestions(generateQuestions(questionCount)); setQIdx(0); setSelected(null); setScore(0); setDone(false); };
  useEffect(() => { start(); }, []);

  if (!questions) return null;
  if (done) {
    const pct = Math.round(score / questions.length * 100);
    let msg = "Weiter \u00fcben!";
    if (pct >= 90) msg = "Hervorragend! \ud83c\udf89";
    else if (pct >= 70) msg = "Sehr gut gemacht! \ud83d\udc4f";
    else if (pct >= 50) msg = "Gut, aber da geht noch mehr!";
    return (
      <div className="card-area fade-in"><div className="card"><div className="results">
        <div className="results-score">{pct}%</div>
        <div className="results-label">{score} von {questions.length} richtig</div>
        <div className="results-message">{msg}</div>
        <button className="btn btn-primary" onClick={start}>Nochmal spielen</button>
      </div></div></div>
    );
  }

  const q = questions[qIdx];
  const handleSelect = (name) => { if (selected) return; setSelected(name); if (name === q.correctName) setScore(s => s + 1); };
  const nextQ = () => { if (qIdx + 1 >= questions.length) setDone(true); else { setQIdx(i => i + 1); setSelected(null); } };

  return (
    <div className="card-area fade-in">
      <div className="settings-row">
        <span className="setting-label">Fragen:</span>
        <select className="setting-select" value={questionCount} onChange={e => setQuestionCount(+e.target.value)}>
          <option value={5}>5</option><option value={10}>10</option><option value={15}>15</option><option value={20}>20</option><option value={30}>30</option>
        </select>
        <button className="btn btn-ghost" onClick={start} style={{ padding: "6px 14px", fontSize: 13 }}>Neu starten</button>
      </div>
      <div className="card">
        <div className="progress-bar-track"><div className="progress-bar-fill" style={{ width: ((qIdx+1)/questions.length*100)+"%" }} /></div>
        <div className="card-counter">Frage {qIdx+1} / {questions.length}</div>
        <div className="mc-example">{q.example}</div>
        <div className="mc-options">
          {q.options.map(name => {
            let cls = "mc-option";
            if (selected) {
              if (name === q.correctName) cls += " mc-correct";
              else if (name === selected && name !== q.correctName) cls += " mc-wrong";
            }
            return <button key={name} className={cls} onClick={() => handleSelect(name)}>{name}</button>;
          })}
        </div>
        {selected && <div className={"feedback " + (selected===q.correctName ? "correct" : "wrong")}>
          {selected===q.correctName ? "Richtig! \u2713" : "Leider falsch. Die richtige Antwort ist: " + q.correctName}
        </div>}
        {selected && <div className="btn-row" style={{ justifyContent: "flex-end" }}>
          <button className="btn btn-primary" onClick={nextQ}>{qIdx+1>=questions.length ? "Ergebnis anzeigen" : "N\u00e4chste Frage \u2192"}</button>
        </div>}
      </div>
    </div>
  );
}

function FreeTextMode() {
  const [questionCount, setQuestionCount] = useState(10);
  const [questions, setQuestions] = useState(null);
  const [qIdx, setQIdx] = useState(0);
  const [input, setInput] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [isCorrect, setIsCorrect] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const inputRef = useRef(null);

  const generateQuestions = (count) => {
    const qs = [];
    const shuffled = shuffle(STILMITTEL);
    for (let i = 0; i < count; i++) {
      const s = shuffled[i % shuffled.length];
      const ex = s.examples[Math.floor(Math.random() * s.examples.length)];
      qs.push({ example: ex, correctName: s.name, definition: s.definition });
    }
    return qs;
  };

  const start = () => { setQuestions(generateQuestions(questionCount)); setQIdx(0); setInput(""); setSubmitted(false); setScore(0); setDone(false); };
  useEffect(() => { start(); }, []);

  const normalize = (s) => s.toLowerCase().trim()
    .replace(/\u00e4/g,"ae").replace(/\u00f6/g,"oe").replace(/\u00fc/g,"ue").replace(/\u00df/g,"ss")
    .replace(/[^a-z]/g,"");

  const checkAnswer = () => {
    if (!input.trim()) return;
    const correct = normalize(input) === normalize(questions[qIdx].correctName);
    setIsCorrect(correct); setSubmitted(true);
    if (correct) setScore(s => s + 1);
  };

  const nextQ = () => {
    if (qIdx + 1 >= questions.length) setDone(true);
    else { setQIdx(i => i + 1); setInput(""); setSubmitted(false); setTimeout(() => inputRef.current?.focus(), 50); }
  };

  if (!questions) return null;
  if (done) {
    const pct = Math.round(score / questions.length * 100);
    let msg = "Weiter \u00fcben!";
    if (pct >= 90) msg = "Hervorragend! \ud83c\udf89";
    else if (pct >= 70) msg = "Sehr gut gemacht! \ud83d\udc4f";
    else if (pct >= 50) msg = "Gut, aber da geht noch mehr!";
    return (
      <div className="card-area fade-in"><div className="card"><div className="results">
        <div className="results-score">{pct}%</div>
        <div className="results-label">{score} von {questions.length} richtig</div>
        <div className="results-message">{msg}</div>
        <button className="btn btn-primary" onClick={start}>Nochmal spielen</button>
      </div></div></div>
    );
  }

  const q = questions[qIdx];

  return (
    <div className="card-area fade-in">
      <div className="settings-row">
        <span className="setting-label">Fragen:</span>
        <select className="setting-select" value={questionCount} onChange={e => setQuestionCount(+e.target.value)}>
          <option value={5}>5</option><option value={10}>10</option><option value={15}>15</option><option value={20}>20</option><option value={30}>30</option>
        </select>
        <button className="btn btn-ghost" onClick={start} style={{ padding: "6px 14px", fontSize: 13 }}>Neu starten</button>
      </div>
      <div className="card">
        <div className="progress-bar-track"><div className="progress-bar-fill" style={{ width: ((qIdx+1)/questions.length*100)+"%" }} /></div>
        <div className="card-counter">Frage {qIdx+1} / {questions.length}</div>
        <div className="ft-example">{q.example}</div>
        <div className="ft-input-row">
          <input ref={inputRef} className={"ft-input" + (submitted ? (isCorrect ? " ft-correct" : " ft-wrong") : "")}
            type="text" placeholder="Stilmittel eingeben\u2026" value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key==="Enter" && !submitted) checkAnswer(); if (e.key==="Enter" && submitted) nextQ(); }}
            disabled={submitted} autoFocus />
          {!submitted && <button className="btn btn-primary" onClick={checkAnswer}>Pr\u00fcfen</button>}
        </div>
        {submitted && <div className={"feedback " + (isCorrect ? "correct" : "wrong")}>
          {isCorrect ? "Richtig! \u2713" : <span>Leider falsch. Die richtige Antwort ist: <strong>{q.correctName}</strong><br /><span style={{ fontWeight: 400, opacity: 0.85 }}>{q.definition}</span></span>}
        </div>}
        {submitted && <div className="btn-row" style={{ justifyContent: "flex-end" }}>
          <button className="btn btn-primary" onClick={nextQ}>{qIdx+1>=questions.length ? "Ergebnis anzeigen" : "N\u00e4chste Frage \u2192"}</button>
        </div>}
      </div>
    </div>
  );
}

function App() {
  const [mode, setMode] = useState("flash");
  return (
    <div className="app">
      <div className="nav-header">
        <h1>Rhetorische Stilmittel</h1>
        <p>{STILMITTEL.length} Stilmittel \u00b7 Drei \u00dcbungsmodi</p>
        <div className="mode-tabs">
          <button className={"mode-tab" + (mode==="flash" ? " active" : "")} onClick={() => setMode("flash")}>Karteikarten</button>
          <button className={"mode-tab" + (mode==="mc" ? " active" : "")} onClick={() => setMode("mc")}>Multiple Choice</button>
          <button className={"mode-tab" + (mode==="ft" ? " active" : "")} onClick={() => setMode("ft")}>Freitext</button>
        </div>
      </div>
      {mode === "flash" && <FlashcardMode key="flash" />}
      {mode === "mc" && <MultipleChoiceMode key="mc" />}
      {mode === "ft" && <FreeTextMode key="ft" />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
